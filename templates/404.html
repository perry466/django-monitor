{% extends "base.html" %}

{% block title %}404 - 一起帮助找回走失儿童 - NEON MONITOR{% endblock %}

{% block extra_style %}
<style>
    .not-found-container {
        min-height: 85vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        text-align: center;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    }

    .error-code {
        font-size: 7.5rem;
        font-weight: 700;
        color: #ef4444;
        margin: 0 0 10px 0;
        line-height: 1;
    }

    .title {
        font-size: 1.85rem;
        color: #1e2937;
        margin-bottom: 12px;
    }

    .subtitle {
        font-size: 1.15rem;
        color: #64748b;
        max-width: 420px;
        margin: 0 auto 35px;
        line-height: 1.6;
    }

    .公益-box {
        width: 100%;
        max-width: 620px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        margin-bottom: 30px;
    }

    .公益-box iframe {
        width: 100%;
        height: 460px;
        border: none;
        display: block;
    }

    .btn-group {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn {
        padding: 14px 32px;
        border-radius: 50px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s;
        font-size: 1.02rem;
    }

    .btn-home {
        background: #22d3ee;
        color: white;
    }

    .btn-home:hover {
        background: #06b6d4;
        transform: translateY(-3px);
    }

    .btn-reload {
        background: #64748b;
        color: white;
    }

    .btn-reload:hover {
        background: #475569;
    }

    .footer-text {
        margin-top: 30px;
        color: #94a3b8;
        font-size: 1rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="not-found-container">

    <h1 class="error-code">404</h1>
    <h2 class="title">页面不见了...</h2>
    <p class="subtitle">
        您访问的页面可能已经被小树带去植树了 🌳<br>
        但我们可以一起帮助另一个走失的孩子回家
    </p>

    <!-- 公益内容区域 -->
    <div class="公益-box">
        <iframe
            src="https://wx.gtimg.com/core/404.html"
            title="帮助寻找失踪儿童公益页面"
            allowfullscreen>
        </iframe>
    </div>

    <div class="btn-group">
        <a href="{% url 'home' %}" class="btn btn-home">← 返回首页</a>
        <a href="javascript:window.location.reload()" class="btn btn-reload">重新加载页面</a>
    </div>

    <div class="footer-text">
        每一次转发，都可能帮助一个家庭团圆 ❤️
    </div>
</div>
{% endblock %}
