<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NEON MONITOR{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap');

        :root {
            --neon-cyan: #00f5d4;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background: #0a0e17;
            color: #00f5d4;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .logo-font {
            font-family: 'Orbitron', sans-serif;
        }

        /* 顶部栏 */
        .top-bar {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid var(--neon-cyan);
            padding: 14px 20px;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        /* 侧边栏 - 极致性能优化 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: rgba(15, 23, 42, 0.98);
            border-right: 1px solid var(--neon-cyan);
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 200;
            padding-top: 70px;
            box-shadow: 8px 0 30px rgba(0, 245, 212, 0.25);
            overflow-y: auto;
            will-change: transform;
        }

        .sidebar.show {
            transform: translateX(0);
        }

        /* 遮罩层 - 解决卡顿核心 */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 150;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            color: #a0f0e8;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.25s ease;
        }

        .menu-item:hover {
            background: rgba(0, 245, 212, 0.15);
            color: #fff;
            padding-left: 32px;
        }

        /* 主内容区 - 完全不改布局属性，彻底避免重排 */
        .main-content {
            padding: 24px 20px;
            min-height: calc(100vh - 60px);
            position: relative;
            z-index: 10;
        }

        .tail-container {
            max-width: 1280px;
            margin: 0 auto;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    {% block extra_style %}{% endblock %}
</head>
<body>

    <!-- 遮罩层 -->
    <div class="overlay" id="overlay"></div>

    <!-- 侧边栏（完整菜单） -->
    <div class="sidebar" id="sidebar">
        <div class="p-6 border-b border-cyan-500/30">
            <div class="logo-font text-3xl font-bold tracking-widest text-white">Booker Tao</div>
            <div class="text-xs tracking-[3px] text-cyan-400 mt-1">陶树人 | 张本瑶荣 | 账本</div>
        </div>

        <div class="menu-items pt-6">
            <a href="{% url 'home' %}" class="menu-item"><span class="mr-4 text-lg">📊</span> 系统仪表盘</a>
            <a href="{% url 'monitor:ping' %}" class="menu-item"><span class="mr-4 text-lg">⚡</span> 延迟测试 (Ping)</a>
            <a href="{% url 'monitor:loss' %}" class="menu-item"><span class="mr-4 text-lg">📉</span> 丢包率测试</a>
            <a href="{% url 'monitor:http_response' %}" class="menu-item"><span class="mr-4 text-lg">🌐</span> HTTP 响应时间</a>
            <a href="{% url 'monitor:jitter' %}" class="menu-item"><span class="mr-4 text-lg">📈</span> 网络抖动</a>
            <a href="{% url 'monitor:dns' %}" class="menu-item"><span class="mr-4 text-lg">🔍</span> DNS 解析时间</a>
            <a href="{% url 'monitor:tcp_retrans' %}" class="menu-item"><span class="mr-4 text-lg">🔄</span> TCP 重传率</a>

            <div class="h-px bg-cyan-500/20 my-6 mx-6"></div>

            <a href="{% url 'targets:config' %}" class="menu-item"><span class="mr-4 text-lg">⚙️</span> 多目标监控配置</a>
            <a href="{% url 'ai_analysis' %}" class="menu-item"><span class="mr-4 text-lg">🤖</span> 小树 智能分析</a>
            <a href="{% url 'logs:system_logs' %}" class="menu-item"><span class="mr-4 text-lg">📋</span> 系统日志</a>
        </div>
    </div>

    <!-- 顶部栏 -->
    <div class="top-bar flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button id="sidebar-toggle" class="w-11 h-11 flex items-center justify-center text-3xl text-cyan-400 hover:text-white transition-all">
                ☰
            </button>
            <div class="logo-font text-2xl font-semibold tracking-wider hidden sm:block">BookerTao MONITOR</div>
        </div>
        <div class="time text-sm text-cyan-300 font-medium" id="current-time"></div>
    </div>

    <!-- 主内容（完全不改布局） -->
    <div class="main-content" id="main-content">
        <div class="tail-container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const toggleBtn = document.getElementById('sidebar-toggle');

        function toggleSidebar() {
            const isOpen = sidebar.classList.toggle('show');
            overlay.classList.toggle('show', isOpen);
        }

        toggleBtn.addEventListener('click', toggleSidebar);

        // 点击遮罩或外部关闭
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('show');
            overlay.classList.remove('show');
        });

        // 实时时间
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent =
                now.toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // ESC 键关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sidebar.classList.contains('show')) {
                sidebar.classList.remove('show');
                overlay.classList.remove('show');
            }
        });
    </script>

    {% block extra_script %}{% endblock %}
</body>
</html>
