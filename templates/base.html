<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NEON MONITOR{% endblock %}</title>

    <!-- Tailwind CSS CDN（解决仪表盘样式问题） -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background: #0a0e17;
            color: #00f5d4;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* ====================== 顶部栏 ====================== */
        .top-bar {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid #00f5d4;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #00f5d4;
        }
        .time {
            font-size: 15px;
            color: #88f0e0;
        }

        /* ====================== 侧边栏 ====================== */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: rgba(15, 23, 42, 0.98);
            border-right: 1px solid #00f5d4;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0.1, 1);
            z-index: 100;
            padding-top: 80px;
            box-shadow: 4px 0 20px rgba(0, 245, 212, 0.15);
        }
        .sidebar.show {
            transform: translateX(0);
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px 28px;
            color: #a0f0e8;
            text-decoration: none;
            font-size: 15.5px;
            transition: background 0.2s ease;
        }
        .menu-item:hover {
            background: rgba(0, 245, 212, 0.15);
            color: #fff;
        }

        /* ====================== 主内容 ====================== */
        .main-content {
            margin-left: 0;
            padding: 32px 40px 40px;
            transition: margin-left 0.35s cubic-bezier(0.32, 0.72, 0.1, 1);
            min-height: calc(100vh - 65px);
        }
        .main-content.expanded {
            margin-left: 280px;
        }

        .toggle-btn {
            position: fixed;
            left: 12px;
            bottom: 40px;
            width: 46px;
            height: 46px;
            background: rgba(0, 245, 212, 0.12);
            border: 2px solid #00f5d4;
            border-radius: 50%;
            color: #00f5d4;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.4);
        }
        .toggle-btn:hover {
            background: rgba(0, 245, 212, 0.25);
            transform: scale(1.1);
        }

        /* 仪表盘专用的霓虹卡片样式（兼容 Tailwind） */
        .neon-card {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(0, 245, 212, 0.4);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.3);
        }

        {% block extra_style %}{% endblock %}
    </style>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- 贴边按钮 -->
    <div class="toggle-btn" id="toggle-btn">☰</div>

    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header p-6 border-b border-cyan-500/30">
            <div class="sidebar-logo text-2xl font-bold tracking-widest">NEON MONITOR</div>
        </div>
        <div class="menu-items pt-4">
            <a href="/" class="menu-item"><i class="mr-4">📊</i> 系统仪表盘</a>
            <a href="/monitor/ping/" class="menu-item"><i class="mr-4">⚡</i> 延迟测试 (Ping)</a>
            <a href="/monitor/loss/" class="menu-item"><i class="mr-4">📉</i> 丢包率测试</a>
            <a href="/monitor/http-response/" class="menu-item"><i class="mr-4">🌐</i> HTTP 响应时间</a>
            <a href="/monitor/jitter/" class="menu-item"><i class="mr-4">📈</i> 网络抖动</a>
            <a href="/monitor/dns/" class="menu-item"><i class="mr-4">🔍</i> DNS 解析时间</a>
            <a href="/monitor/tcp-retrans/" class="menu-item"><i class="mr-4">🔄</i> TCP 重传率</a>
            <a href="/targets/config/" class="menu-item"><i class="mr-4">⚙️</i> 多目标监控配置</a>
            <a href="{% url 'ai_analysis' %}" class="menu-item">🤖 AI 智能分析</a>
            <a class="nav-link" href="/logs/system-logs/">📋 系统日志</a>
        </div>
    </div>

    <!-- 顶部栏 -->
    <div class="top-bar">
        <div class="logo">NEON MONITOR</div>
        <div class="time" id="current-time"></div>
    </div>

    <!-- 主内容 -->
    <div class="main-content" id="main-content">
        {% block content %}{% endblock %}
    </div>

    <script>
        // 侧边栏切换
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-btn');
        const mainContent = document.getElementById('main-content');

        function toggleSidebar() {
            sidebar.classList.toggle('show');
            mainContent.classList.toggle('expanded');
            toggleBtn.textContent = sidebar.classList.contains('show') ? '✕' : '☰';
        }
        toggleBtn.addEventListener('click', toggleSidebar);

        // 实时时间
        function updateTime() {
            document.getElementById('current-time').textContent = new Date().toLocaleString('zh-CN');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 移除 FOUC 隐藏逻辑（已不再需要）
        // window.addEventListener('load', () => { ... });  这行可以删掉或保留
    </script>

    {% block extra_script %}{% endblock %}
</body>
</html>
