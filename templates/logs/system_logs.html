{% extends "base.html" %}

{% block title %}系统日志 - NEON MONITOR{% endblock %}

{% block extra_style %}
<style>
    .neon-card {
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(0, 245, 212, 0.4);
        box-shadow: 0 0 30px rgba(0, 245, 212, 0.35);
        transition: all 0.4s ease;
    }

    .download-btn {
        background: rgba(0, 245, 212, 0.08);
        border: 2px solid #00f5d4;
        color: #00f5d4;
        padding: 12px 28px;
        border-radius: 9999px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(0, 245, 212, 0.3);
    }
    .download-btn:hover {
        background: #00f5d4;
        color: #0a0e17;
        box-shadow: 0 0 30px rgba(0, 245, 212, 0.6);
        transform: translateY(-2px);
    }

    .logs-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px 16px;
    }

    .page-header {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 32px;
    }

    .page-header h1 {
        font-size: 2.4rem;
        font-weight: 700;
        color: #fff;
        margin: 0;
    }

    .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
    }

    .filter-bar select {
        background: #1e2937;
        border: 1px solid #475569;
        color: #e2e8f0;
        border-radius: 9999px;
        padding: 0 20px;
        height: 46px;
        min-width: 160px;
    }

    .log-table-container {
        background: #1e2937;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .log-table th {
        background: #334155;
        color: #94a3b8;
        text-transform: uppercase;
        font-size: 0.82rem;
        font-weight: 600;
        padding: 18px 16px;
        text-align: left;
    }

    .log-table td {
        padding: 16px;
        border-bottom: 1px solid #334155;
        color: #cbd5e1;
        vertical-align: middle;
    }

    .log-result {
        font-family: 'Consolas', monospace;
        font-size: 0.92rem;
        color: #94a3b8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 460px;
    }

    .type-badge {
        padding: 6px 16px;
        border-radius: 9999px;
        font-size: 0.82rem;
        font-weight: 600;
        white-space: nowrap;
    }

    .ping-badge    { background: #22d3ee30; color: #22d3ee; }
    .http-badge    { background: #a855f730; color: #a855f7; }
    .dns-badge     { background: #eab30830; color: #eab308; }
    .jitter-badge  { background: #f9731630; color: #f97316; }
    .tcp-badge     { background: #ef444430; color: #ef4444; }

    .footer-bar {
        margin-top: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
    }

    .pagination {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .page-link {
        background: #334155;
        color: #cbd5e1;
        border: 1px solid #475569;
        padding: 10px 18px;
        border-radius: 9999px;
        min-width: 44px;
        text-align: center;
        transition: all 0.2s;
    }

    .page-link:hover {
        background: #475569;
        color: white;
    }

    .page-item.active .page-link {
        background: #00f5d4;
        color: #0a0e17;
        font-weight: 700;
    }

    /* 跳转组件 */
    .jump-box {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #334155;
        padding: 8px 16px;
        border-radius: 9999px;
        border: 1px solid #475569;
    }

    .jump-box input {
        width: 72px;
        background: #1e2937;
        border: 1px solid #475569;
        color: #e2e8f0;
        text-align: center;
        border-radius: 9999px;
        padding: 8px;
    }

    .jump-box button {
        padding: 8px 16px;
        background: #00f5d4;
        color: #0a0e17;
        border: none;
        border-radius: 9999px;
        font-size: 0.9rem;
        font-weight: 600;
    }

    .page-info {
        color: #94a3b8;
        font-size: 0.95rem;
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="logs-container">

    <!-- 顶部标题栏 + 过滤器 -->
    <div class="page-header">
        <div>
            <h1 class="text-white text-3xl font-bold flex items-center gap-4">
                📊 系统监控日志
            </h1>
            <p class="text-slate-400 mt-1">实时原始监控记录 · 一屏显示</p>
        </div>

        <div class="filter-bar">
            <select id="log_type">
                <option value="all">全部监控</option>
                <option value="ping">Ping & 丢包率</option>
                <option value="http">HTTP响应时间</option>
                <option value="dns">DNS解析时间</option>
                <option value="jitter">网络抖动</option>
                <option value="tcp_retrans">TCP重传率</option>
            </select>

            <select id="period" onchange="toggleCustomDate()">
                <option value="all">全部日志</option>
                <option value="today">今日</option>
                <option value="7days">近 7 天</option>
                <option value="30days">近 30 天</option>
                <option value="custom">自定义范围</option>
            </select>

            <div id="custom_date" class="flex gap-3" style="display: none;">
                <input type="date" id="start_date" class="bg-zinc-800 border border-zinc-700 text-white rounded-3xl px-5 py-3">
                <input type="date" id="end_date" class="bg-zinc-800 border border-zinc-700 text-white rounded-3xl px-5 py-3">
            </div>

            <button onclick="loadLogs(1)"
                    class="px-8 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold rounded-3xl transition-all">
                查询
            </button>

            <!-- 只在这里新增下载按钮，紧挨查询按钮右侧 -->
            <button onclick="downloadLogs()" class="download-btn">
                <span class="text-xl">⬇️</span>
                下载日志
            </button>
        </div>
    </div>

    <!-- 日志表格（完全不动） -->
    <div class="neon-card rounded-3xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="log-table w-full">
                <thead>
                    <tr>
                        <th style="width: 18%;">时间</th>
                        <th style="width: 16%;">目标</th>
                        <th style="width: 16%;">类型</th>
                        <th style="width: 10%;">状态</th>
                        <th>原始监控数据</th>
                    </tr>
                </thead>
                <tbody id="log_table_body" class="text-slate-300"></tbody>
            </table>
        </div>
    </div>

    <!-- 底部分页栏（完全不动） -->
    <div class="footer-bar">
        <nav>
            <ul class="pagination" id="pagination"></ul>
        </nav>
        <div class="page-info text-cyan-300 text-sm mt-4" id="page-info"></div>
    </div>

</div>
{% endblock %}

{% block extra_script %}
<script>
let currentPage = 1;
let totalPages = 1;

function toggleCustomDate() {
    const customDiv = document.getElementById('custom_date');
    customDiv.style.display = document.getElementById('period').value === 'custom' ? 'flex' : 'none';
}

// 下载日志功能
function downloadLogs() {
    const log_type = document.getElementById('log_type').value;
    const period = document.getElementById('period').value;
    const start_date = document.getElementById('start_date').value;
    const end_date = document.getElementById('end_date').value;

    let url = `/logs/download/?log_type=${log_type}&period=${period}`;
    if (period === 'custom' && start_date && end_date) {
        url += `&start_date=${start_date}&end_date=${end_date}`;
    }

    window.location.href = url;
}

// ==================== 下面是你原来的所有 JS 代码，完全不动 ====================
async function loadLogs(page = 1) {
    currentPage = page;

    const log_type = document.getElementById('log_type').value;
    const period = document.getElementById('period').value;
    const start_date = document.getElementById('start_date').value;
    const end_date = document.getElementById('end_date').value;

    let url = `/logs/api/system-logs/?page=${page}&per_page=15&log_type=${log_type}&period=${period}`;
    if (period === 'custom' && start_date && end_date) {
        url += `&start_date=${start_date}&end_date=${end_date}`;
    }

    try {
        const res = await fetch(url);
        const data = await res.json();

        if (!data.success) {
            console.error(data.error);
            return;
        }

        totalPages = data.total_pages || 1;

        let html = '';
        data.logs.forEach(log => {
            let typeClass = 'type-badge ';
            if (log.log_type.includes('ping')) typeClass += 'ping-badge';
            else if (log.log_type.includes('http')) typeClass += 'http-badge';
            else if (log.log_type.includes('dns')) typeClass += 'dns-badge';
            else if (log.log_type.includes('jitter')) typeClass += 'jitter-badge';
            else if (log.log_type.includes('tcp')) typeClass += 'tcp-badge';

            html += `
                <tr>
                    <td>${log.created_at}</td>
                    <td><strong>${log.target}</strong></td>
                    <td><span class="${typeClass}">${log.log_type}</span></td>
                    <td><span class="text-emerald-400">✅ 正常</span></td>
                    <td class="log-result">${log.result}</td>
                </tr>`;
        });

        document.getElementById('log_table_body').innerHTML =
            html || `<tr><td colspan="5" class="text-center py-12 text-slate-400">暂无监控记录</td></tr>`;

        renderPagination(totalPages, page);
        document.getElementById('page-info').textContent = `第 ${page} 页 / 共 ${totalPages} 页`;
    } catch (e) {
        console.error('加载日志失败', e);
    }
}

function renderPagination(total, current) {
    let html = '';

    html += `<li class="page-item ${current <= 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="loadLogs(${current-1}); return false;">←</a>
             </li>`;

    const maxVisible = 7;
    let start = Math.max(1, current - 3);
    let end = Math.min(total, start + maxVisible - 1);

    if (end - start + 1 < maxVisible) start = Math.max(1, end - maxVisible + 1);

    if (start > 1) {
        html += `<li><a class="page-link" href="#" onclick="loadLogs(1); return false;">1</a></li>`;
        if (start > 2) html += `<li class="page-item disabled"><span class="page-link">…</span></li>`;
    }

    for (let i = start; i <= end; i++) {
        html += `<li class="page-item ${i === current ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadLogs(${i}); return false;">${i}</a>
                 </li>`;
    }

    if (end < total) {
        if (end < total - 1) html += `<li class="page-item disabled"><span class="page-link">…</span></li>`;
        html += `<li><a class="page-link" href="#" onclick="loadLogs(${total}); return false;">${total}</a></li>`;
    }

    // 跳转组件
    html += `
        <li style="margin: 0 12px;">
            <div class="jump-box">
                <input type="number" id="jump_page" min="1" placeholder="页码"
                       onkeypress="if(event.key==='Enter') jumpToPage()">
                <button onclick="jumpToPage()" class="text-xs px-5 py-2 bg-cyan-500 text-black rounded-3xl">Go</button>
            </div>
        </li>`;

    html += `<li class="page-item ${current >= total ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="loadLogs(${current+1}); return false;">→</a>
             </li>`;

    document.getElementById('pagination').innerHTML = html;
}

function jumpToPage() {
    const input = document.getElementById('jump_page');
    let page = parseInt(input.value);
    if (isNaN(page) || page < 1) return;
    if (page > totalPages) page = totalPages;
    loadLogs(page);
    input.value = '';
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    loadLogs(1);
});
</script>
{% endblock %}
