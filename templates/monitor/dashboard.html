{% extends "base.html" %}

{% block title %}系统仪表盘 - NEON MONITOR{% endblock %}

{% block content %}
    <h1 style="font-family: 'Orbitron', sans-serif; text-align:center; font-size:38px; margin-bottom:50px; color:#00f5d4; text-shadow:0 0 15px rgba(0,245,212,0.6);">
        HOST RESOURCE MONITOR
    </h1>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 28px; max-width: 1200px; margin: 0 auto;">

        <!-- 内存 -->
        <div style="background: rgba(20,30,48,0.85); border:1px solid rgba(0,245,212,0.35); border-radius:12px; padding:32px 28px;">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px; font-size:15px; color:#88e0d0;">
                💾 MEMORY USAGE
            </div>
            <div id="memory-value" style="font-size:68px; font-weight:600; color:#00f5d4; line-height:1;">0</div>
            <span style="font-size:18px; color:#88e0d0;">%</span>
            <div style="margin-top:18px;"><span id="memory-status" class="status normal">NOMINAL</span></div>
        </div>

        <!-- 磁盘 -->
        <div style="background: rgba(20,30,48,0.85); border:1px solid rgba(0,245,212,0.35); border-radius:12px; padding:32px 28px;">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px; font-size:15px; color:#88e0d0;">
                💿 STORAGE USAGE
            </div>
            <div id="disk-value" style="font-size:68px; font-weight:600; color:#00f5d4; line-height:1;">0</div>
            <span style="font-size:18px; color:#88e0d0;">%</span>
            <div style="margin-top:18px;"><span id="disk-status" class="status normal">NOMINAL</span></div>
        </div>

        <!-- 网速 -->
        <div style="background: rgba(20,30,48,0.85); border:1px solid rgba(0,245,212,0.35); border-radius:12px; padding:32px 28px;">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px; font-size:15px; color:#88e0d0;">
                🌐 NETWORK THROUGHPUT
            </div>
            <div id="network-value" style="font-size:68px; font-weight:600; color:#00f5d4; line-height:1;">0.00</div>
            <span style="font-size:18px; color:#88e0d0;">KB/s</span>
            <div style="margin-top:18px;"><span id="network-status" class="status normal">STABLE</span></div>
        </div>
    </div>

    <div id="error-msg" style="color:#ff6688; text-align:center; margin-top:40px; font-size:17px; display:none;">
        无法获取系统监控数据，请检查后端服务
    </div>
{% endblock %}

{% block extra_script %}
<script>
    function updateDashboard() {
        fetch('/monitor/api/system/')
            .then(response => response.json())
            .then(data => {
                if (data.code === 0 && data.data) {
                    const info = data.data;

                    // 内存
                    const mem = Math.round(info.memory || 0);
                    document.getElementById('memory-value').textContent = mem;
                    updateStatus('memory-status', mem, 70, 85);

                    // 磁盘
                    const disk = Math.round(info.disk || 0);
                    document.getElementById('disk-value').textContent = disk;
                    updateStatus('disk-status', disk, 75, 90);

                    // 网速
                    const net = (info.network || 0).toFixed(2);
                    document.getElementById('network-value').textContent = net;

                    document.getElementById('error-msg').style.display = 'none';
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            })
            .catch(() => {
                document.getElementById('error-msg').style.display = 'block';
            });
    }

    function updateStatus(id, value, warn, danger) {
        const el = document.getElementById(id);
        if (value >= danger) {
            el.textContent = 'CRITICAL';
            el.className = 'status danger';
        } else if (value >= warn) {
            el.textContent = 'WARNING';
            el.className = 'status warning';
        } else {
            el.textContent = 'NOMINAL';
            el.className = 'status normal';
        }
    }

    // 初始化实时更新
    document.addEventListener('DOMContentLoaded', function() {
        updateDashboard();
        setInterval(updateDashboard, 3000);
    });
</script>
{% endblock %}
