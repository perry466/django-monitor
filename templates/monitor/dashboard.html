<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>监控系统仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-gradient"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #0f172a;
            --light-bg: #f4f6f9;
            --card-bg: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-radius: 20px;
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @font-face {
            font-family: 'Inter';
            src: url('https://rsms.me/inter/font-files/Inter-Regular.woff2') format('woff2'),
                 url('https://rsms.me/inter/font-files/Inter-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1e293b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 导航栏 */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            box-shadow: var(--shadow-lg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-color), #60a5fa);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary-color), #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            margin: 0 40px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            position: relative;
            padding: 8px 0;
            transition: var(--transition);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0%;
            height: 2px;
            bottom: 0;
            left: 0;
            background: linear-gradient(90deg, var(--primary-color), #60a5fa);
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link.active {
            color: var(--text-primary);
        }

        .nav-link.active::after {
            width: 100%;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time-display {
            color: var(--text-secondary);
            font-size: 14px;
            margin-right: 20px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #60a5fa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
        }

        .avatar:hover {
            transform: scale(1.1);
        }

        /* 主容器 */
        .main-container {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* 侧边栏 */
        .sidebar {
            width: 250px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            padding: 25px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-item {
            padding: 12px 25px;
            margin: 5px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-color);
        }

        .sidebar-item.active {
            background: rgba(59, 130, 246, 0.2);
            color: var(--primary-color);
        }

        .sidebar-icon {
            width: 20px;
            height: 20px;
        }

        /* 内容区域 */
        .content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .page-title {
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius);
            padding: 25px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg,
                rgba(59, 130, 246, 0.3),
                rgba(34, 197, 94, 0.3),
                rgba(245, 158, 11, 0.3),
                rgba(239, 68, 68, 0.3)
            );
            border-radius: calc(var(--border-radius) + 2px);
            z-index: -1;
            opacity: 0;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .status-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .status-normal {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success-color);
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning-color);
        }

        .status-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
        }

        .chart-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
        }

        .chart-center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .chart-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .chart-unit {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .trend-chart {
            height: 60px;
            margin-top: 15px;
        }

        /* 实时指示器 */
        .realtime-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
            animation: pulse 2s infinite;
            margin-right: 8px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }

            .nav-links {
                margin: 15px 0;
                flex-wrap: wrap;
                justify-content: center;
            }

            .sidebar {
                display: none;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .card {
                margin-bottom: 20px;
            }
        }

        /* 暗黑模式切换按钮 */
        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(30deg);
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo-section">
        <div class="logo">M</div>
        <div class="logo-text">MonitorHub</div>
    </div>

    <div class="nav-links">
        <a href="/" class="nav-link active">仪表盘</a>
        <a href="/monitor/ping/" class="nav-link">延迟测试</a>
        <a href="#" class="nav-link">丢包率测试</a>
        <a href="#" class="nav-link">HTTP 响应时间</a>
        <a href="#" class="nav-link">网络抖动</a>
        <a href="#" class="nav-link">DNS 解析时间</a>
        <a href="#" class="nav-link">TCP 重传率</a>
        <a href="#" class="nav-link">多目标监控配置</a>
    </div>

    <div class="user-info">
        <div class="time-display" id="currentTime">2024-01-01 00:00:00</div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <div class="avatar">U</div>
    </div>
</div>

<div class="main-container">
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li class="sidebar-item active">
                <span class="sidebar-icon">📊</span>
                <span>系统监控</span>
            </li>
            <li class="sidebar-item">
                <span class="sidebar-icon">🌐</span>
                <span>网络测试</span>
            </li>
            <li class="sidebar-item">
                <span class="sidebar-icon">📈</span>
                <span>性能分析</span>
            </li>
            <li class="sidebar-item">
                <span class="sidebar-icon">⚙️</span>
                <span>配置管理</span>
            </li>
            <li class="sidebar-item">
                <span class="sidebar-icon">🔔</span>
                <span>告警设置</span>
            </li>
        </ul>
    </div>

    <div class="content">
        <h1 class="page-title">
            <span class="realtime-indicator"></span>
            主机资源监控（实时）
        </h1>

        <div class="cards-grid">
            <!-- 内存使用率卡片 -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <div class="card-icon" style="background: rgba(34, 197, 94, 0.2); color: var(--success-color);">
                            💾
                        </div>
                        内存使用率
                    </h3>
                    <span class="status-tag status-normal" id="memoryStatus">正常</span>
                </div>
                <div class="chart-container">
                    <canvas id="memoryChart"></canvas>
                    <div class="chart-center-text">
                        <div class="chart-value" id="memoryValue">0%</div>
                        <div class="chart-unit">使用中</div>
                    </div>
                </div>
                <canvas class="trend-chart" id="memoryTrend"></canvas>
            </div>

            <!-- 磁盘使用率卡片 -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <div class="card-icon" style="background: rgba(245, 158, 11, 0.2); color: var(--warning-color);">
                            💿
                        </div>
                        磁盘使用率
                    </h3>
                    <span class="status-tag status-warning" id="diskStatus">警告</span>
                </div>
                <div class="chart-container">
                    <canvas id="diskChart"></canvas>
                    <div class="chart-center-text">
                        <div class="chart-value" id="diskValue">0%</div>
                        <div class="chart-unit">已占用</div>
                    </div>
                </div>
                <canvas class="trend-chart" id="diskTrend"></canvas>
            </div>

            <!-- 当前网速卡片 -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <div class="card-icon" style="background: rgba(59, 130, 246, 0.2); color: var(--primary-color);">
                            🌐
                        </div>
                        当前网速
                    </h3>
                    <span class="status-tag status-normal" id="networkStatus">正常</span>
                </div>
                <div class="chart-container">
                    <canvas id="networkChart"></canvas>
                    <div class="chart-center-text">
                        <div class="chart-value" id="networkValue">0</div>
                        <div class="chart-unit">KB/s</div>
                    </div>
                </div>
                <canvas class="trend-chart" id="networkTrend"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
// 更新时间显示
function updateTime() {
    const now = new Date();
    const timeString = now.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });
    document.getElementById('currentTime').textContent = timeString;
}

// 主题切换
function toggleTheme() {
    const themeButton = document.querySelector('.theme-toggle');
    if (document.body.style.background.startsWith('linear-gradient(135deg, rgb(15, 23, 42)')) {
        // 切换到浅色主题
        document.body.style.background = 'linear-gradient(135deg, #f4f6f9 0%, #e2e8f0 100%)';
        document.body.style.color = '#1f2937';
        themeButton.textContent = '☀️';
    } else {
        // 切换到深色主题
        document.body.style.background = 'linear-gradient(135deg, var(--dark-bg) 0%, #1e293b 100%)';
        document.body.style.color = var('--text-primary');
        themeButton.textContent = '🌙';
    }
}

// 颜色映射函数
function getColor(value) {
    if (value < 60) return {
        primary: '#22c55e',
        gradient: ['#22c55e', '#16a34a']
    };
    if (value < 80) return {
        primary: '#f59e0b',
        gradient: ['#f59e0b', '#d97706']
    };
    return {
        primary: '#ef4444',
        gradient: ['#ef4444', '#dc2626']
    };
}

// 创建渐变环形图
function createGradientDoughnut(ctx) {
    const config = {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [0, 100],
                backgroundColor: ['#22c55e', 'rgba(255, 255, 255, 0.1)'],
                borderWidth: 0,
                borderRadius: 12,
                spacing: 2
            }]
        },
        options: {
            cutout: '70%',
            animation: {
                animateRotate: true,
                duration: 1000,
                easing: 'easeOutQuart'
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    enabled: true,
                    callbacks: {
                        label: function(context) {
                            return `${context.parsed} %`;
                        }
                    }
                }
            }
        }
    };

    return new Chart(ctx, config);
}

// 创建趋势图
function createTrendChart(ctx) {
    return new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(10).fill(''),
            datasets: [{
                data: [],
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: { display: false },
                y: { display: false }
            },
            interaction: { intersect: false, mode: 'index' }
        }
    });
}

// 初始化图表
const memoryChart = createGradientDoughnut(document.getElementById('memoryChart'));
const diskChart = createGradientDoughnut(document.getElementById('diskChart'));
const networkChart = createGradientDoughnut(document.getElementById('networkChart'));

const memoryTrend = createTrendChart(document.getElementById('memoryTrend'));
const diskTrend = createTrendChart(document.getElementById('diskTrend'));
const networkTrend = createTrendChart(document.getElementById('networkTrend'));

// 历史数据存储
let history = {
    memory: [],
    disk: [],
    network: []
};

// 更新图表函数
function updateChart(chart, trendChart, valueElement, statusElement, value, key, unit = '%') {
    const colorInfo = getColor(value);

    // 更新主图表
    chart.data.datasets[0].data = [value, 100 - value];
    chart.data.datasets[0].backgroundColor = [
        `linear-gradient(135deg, ${colorInfo.gradient[0]}, ${colorInfo.gradient[1]})`,
        'rgba(255, 255, 255, 0.1)'
    ];

    // 更新中心文本
    const valueElementObj = document.getElementById(valueElement);
    if (unit === '%') {
        valueElementObj.textContent = value.toFixed(1);
    } else {
        valueElementObj.textContent = Math.round(value);
    }

    // 更新状态标签
    const statusElementObj = document.getElementById(statusElement);
    if (value < 60) {
        statusElementObj.className = 'status-tag status-normal';
        statusElementObj.textContent = '正常';
    } else if (value < 80) {
        statusElementObj.className = 'status-tag status-warning';
        statusElementObj.textContent = '警告';
    } else {
        statusElementObj.className = 'status-tag status-danger';
        statusElementObj.textContent = '危险';
    }

    // 更新趋势图
    history[key].push(value);
    if (history[key].length > 10) {
        history[key].shift();
    }
    trendChart.data.datasets[0].data = [...history[key]];
    trendChart.data.datasets[0].borderColor = colorInfo.primary;
    trendChart.data.datasets[0].backgroundColor = `rgba(${parseInt(colorInfo.primary.slice(1, 3), 16)}, ${parseInt(colorInfo.primary.slice(3, 5), 16)}, ${parseInt(colorInfo.primary.slice(5, 7), 16)}, 0.1)`;

    // 触发动画
    chart.update('active');
    trendChart.update();
}

// 模拟数据获取
function fetchData() {
    // 模拟API响应
    const mockData = {
        code: 0,
        data: {
            memory: Math.random() * 100,
            disk: Math.random() * 100,
            network: Math.random() * 300
        }
    };

    // 实际API调用
    /*
    fetch('/monitor/api/system/')
        .then(res => res.json())
        .then(data => {
            if (data.code !== 0) return;

            updateChart(memoryChart, memoryTrend, 'memoryValue', 'memoryStatus', data.data.memory, 'memory');
            updateChart(diskChart, diskTrend, 'diskValue', 'diskStatus', data.data.disk, 'disk');
            updateChart(networkChart, networkTrend, 'networkValue', 'networkStatus', data.data.network, 'network', 'KB/s');
        })
        .catch(error => {
            console.error('数据获取失败:', error);
        });
    */

    // 使用模拟数据
    updateChart(memoryChart, memoryTrend, 'memoryValue', 'memoryStatus', mockData.data.memory, 'memory');
    updateChart(diskChart, diskTrend, 'diskValue', 'diskStatus', mockData.data.disk, 'disk');
    updateChart(networkChart, networkTrend, 'networkValue', 'networkStatus', mockData.data.network, 'network', 'KB/s');
}

// 定时更新
setInterval(fetchData, 2000);
setInterval(updateTime, 1000);

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    updateTime();
    fetchData(); // 立即获取一次数据
});
</script>

</body>
</html>
