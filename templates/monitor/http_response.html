{% extends "base.html" %}

{% block title %}HTTP 响应时间监控 - NEON MONITOR{% endblock %}

{% block extra_style %}
<style>
    .neon-card {
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(0, 245, 212, 0.4);
        box-shadow: 0 0 25px rgba(0, 245, 212, 0.3);
        transition: all 0.4s ease;
    }
    .neon-card:hover {
        box-shadow: 0 0 40px rgba(0, 245, 212, 0.5);
        transform: translateY(-6px);
    }

    /* 强制四个卡片保持同一排，溢出时横向滚动 */
    .http-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(260px, 1fr));   /* 强制 4 列 */
        gap: 20px;
        margin-bottom: 60px;
        overflow-x: auto;                 /* 小屏时允许横向滚动 */
        padding-bottom: 12px;
    }

    /* 隐藏滚动条但保留滚动功能（更美观） */
    .http-grid::-webkit-scrollbar {
        height: 6px;
    }
    .http-grid::-webkit-scrollbar-thumb {
        background: rgba(0, 245, 212, 0.4);
        border-radius: 10px;
    }

    .http-card {
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(0, 245, 212, 0.35);
        border-radius: 20px;
        padding: 28px 24px;
        position: relative;
        overflow: hidden;
        min-height: 280px;
        transition: all 0.4s ease;
        flex-shrink: 0;                    /* 防止卡片被压缩 */
    }

    .http-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 0 45px rgba(0, 245, 212, 0.5);
    }

    /* 顶部流动霓虹线 */
    .http-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #00f5d4, #a855f7, #ec4899, #fb923c);
        background-size: 300% 100%;
        animation: neon-flow 4s linear infinite;
    }

    @keyframes neon-flow {
        0% { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
    }

    .response-time {
        font-family: 'Orbitron', sans-serif;
        font-size: 3.1rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -3px;
        margin: 20px 0 12px;
    }

    .status-badge {
        padding: 8px 20px;
        border-radius: 9999px;
        font-size: 0.95rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .chart-container {
        position: relative;
        height: 420px;
    }

    @media (max-width: 640px) {
        .http-grid {
            grid-template-columns: repeat(4, minmax(240px, 1fr));   /* 小屏时稍微缩小卡片 */
        }
        .response-time {
            font-size: 2.6rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <!-- 页面标题 -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6 mb-12">
        <div class="flex items-center gap-4">
            <div class="text-6xl">🌐</div>
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold tracking-tighter text-cyan-400"
                    style="font-family: 'Orbitron', sans-serif;">
                    HTTP 响应时间监控
                </h1>
                <p class="text-cyan-300 mt-2 text-base sm:text-lg">
                    实时监测全球主流服务响应速度
                </p>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row items-center gap-4 sm:gap-6">
            <button onclick="fetchData()" id="refresh-btn"
                    class="w-full sm:w-auto flex items-center justify-center gap-3 px-8 py-4 bg-slate-900 hover:bg-slate-800 border border-cyan-400 hover:border-white rounded-2xl transition-all text-lg font-medium">
                <span class="text-2xl">🔄</span>
                <span>立即刷新</span>
            </button>

            <div class="text-right">
                <div class="text-xs uppercase tracking-widest text-cyan-400/70">最后更新</div>
                <div id="last-updated" class="font-mono text-2xl text-white">——</div>
            </div>
        </div>
    </div>

    <!-- HTTP 服务卡片网格（强制同一排） -->
    <div id="http-cards" class="http-grid">
        <!-- JS 动态生成卡片 -->
    </div>

    <!-- 响应时间趋势图 -->
    <div class="neon-card rounded-3xl p-6 sm:p-10">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <h2 class="text-2xl sm:text-3xl font-semibold text-cyan-400 flex items-center gap-3">
                📈 响应时间趋势（最近 20 次采样）
            </h2>
            <div id="chart-last-updated" class="font-mono text-cyan-300 text-sm sm:text-base">
                更新于 ——
            </div>
        </div>

        <div class="chart-container">
            <canvas id="responseTrendChart"></canvas>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_script %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
    let responseChart = null;
    const colors = ['#00f5d4', '#a855f7', '#ec4899', '#fb923c'];

    function getStatusStyle(ms) {
        if (!ms || isNaN(ms)) return { color: '#888888', text: 'N/A' };
        if (ms > 800) return { color: '#ff4d4d', text: '较差' };
        if (ms > 400) return { color: '#ffaa00', text: '需关注' };
        return { color: '#00f5d4', text: '优秀' };
    }

    function createCards(results) {
        const container = document.getElementById('http-cards');
        container.innerHTML = '';

        results.forEach((item) => {
            const ms = parseFloat(item.response_time);
            const status = getStatusStyle(ms);

            const cardHTML = `
                <div class="http-card neon-card">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 min-w-0">
                            <div class="text-xl font-semibold text-white truncate">${item.target}</div>
                            <div class="text-xs text-cyan-300 mt-2 break-all">${item.url}</div>
                        </div>
                        <div class="status-badge ml-4"
                             style="background: rgba(0,245,212,0.1); color: ${status.color}; border: 1px solid ${status.color}40;">
                            ${status.text}
                        </div>
                    </div>

                    <div class="text-center my-12">
                        <div class="response-time" style="color: ${status.color};">
                            ${ms ? ms.toFixed(1) : '—'}
                            <span style="font-size: 1.35rem; font-weight: 400;">ms</span>
                        </div>
                    </div>

                    <div class="text-center pt-6 border-t border-cyan-500/20">
                        <div class="text-xs text-cyan-400/70">采样时间</div>
                        <div class="font-mono text-sm text-cyan-300 mt-1">${item.timestamp}</div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    function updateChart(historyData) {
        const ctx = document.getElementById('responseTrendChart');
        if (responseChart) responseChart.destroy();

        responseChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: historyData.labels || [],
                datasets: historyData.datasets.map((ds, i) => ({
                    ...ds,
                    borderColor: colors[i % colors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 3.5,
                    tension: 0.4,
                    pointRadius: 2,
                    pointHoverRadius: 7,
                    pointBackgroundColor: '#0a0e17'
                }))
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 800 },
                plugins: {
                    legend: {
                        position: 'top',
                        align: 'start',
                        labels: {
                            color: '#a0f0e8',
                            font: { size: 13 },
                            padding: 18,
                            boxWidth: 14
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.95)',
                        titleColor: '#67e8f9',
                        bodyColor: '#e2e8f0',
                        padding: 12
                    }
                },
                scales: {
                    y: {
                        grid: { color: 'rgba(0, 245, 212, 0.08)' },
                        ticks: { color: '#88f0e0', font: { size: 12 } }
                    },
                    x: {
                        grid: { color: 'rgba(0, 245, 212, 0.08)' },
                        ticks: { color: '#88f0e0', font: { size: 12 }, maxRotation: 45 }
                    }
                }
            }
        });
    }

    async function fetchData() {
        const btn = document.getElementById('refresh-btn');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = `<span class="animate-spin inline-block mr-2">⟳</span>加载中...`;
        btn.disabled = true;

        try {
            const res = await fetch('/monitor/api/multi-http/');
            const json = await res.json();

            if (json.code === 0 && json.data) {
                createCards(json.data.results || []);

                if (json.data.history) {
                    updateChart(json.data.history);
                }

                const now = new Date().toLocaleTimeString('zh-CN', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });

                document.getElementById('last-updated').textContent = now;
                document.getElementById('chart-last-updated').textContent = `更新于 ${now}`;
            }
        } catch (err) {
            console.error('获取HTTP数据失败:', err);
        } finally {
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    }

    // 初始化
    window.addEventListener('load', () => {
        fetchData();
        setInterval(fetchData, 60000);
    });
</script>
{% endblock %}
