{% extends "base.html" %}

{% block title %}HTTP 响应时间监控 - NEON MONITOR{% endblock %}

{% block extra_style %}
<style>
    .http-container {
        max-width: 100%;
        padding: 0;
    }

    .http-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 22px;
        margin-bottom: 60px;
    }

    @media (max-width: 1400px) {
        .http-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 900px) {
        .http-grid { grid-template-columns: 1fr; }
    }

    .http-card {
        background: rgba(15, 23, 42, 0.92);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 245, 212, 0.3);
        border-radius: 18px;
        padding: 24px;
        position: relative;
        overflow: hidden;
        transition: transform 0.25s ease;
        min-height: 260px;
    }

    .http-card:hover {
        transform: translateY(-6px);
    }

    .http-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #00f5d4, #a855f7, #ec4899, #fb923c);
        background-size: 300% 100%;
        animation: neon-flow 4s linear infinite;
    }

    @keyframes neon-flow {
        0% { background-position: 0% 50%; }
        100% { background-position: 300% 50%; }
    }

    .response-time {
        font-family: 'Orbitron', sans-serif;
        font-size: 3.5rem;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -3px;
        margin: 16px 0 8px;
    }

    .status-badge {
        padding: 6px 14px;
        border-radius: 9999px;
        font-size: 13px;
        font-weight: 500;
    }
</style>
{% endblock %}

{% block content %}
<div class="http-container">
    <!-- 页面标题 -->
    <div class="flex items-center justify-between mb-12">
        <div class="flex items-center gap-5">
            <div class="text-5xl">🌐</div>
            <div>
                <h1 class="text-4xl font-bold tracking-tighter" style="font-family: 'Orbitron', sans-serif; color: #00f5d4;">
                    HTTP 响应时间监控
                </h1>
                <p class="text-lg text-cyan-300 mt-1">实时监测全球主流服务响应速度</p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <button onclick="refreshData()" id="refresh-btn"
                    class="flex items-center gap-3 px-8 py-4 bg-slate-900 hover:bg-slate-800 border border-[#00f5d4] hover:border-white rounded-2xl transition-all text-lg">
                <span class="text-2xl">🔄</span>
                <span class="font-medium">立即刷新</span>
            </button>

            <div class="text-right">
                <div class="text-xs uppercase tracking-widest text-cyan-400/70">最后更新</div>
                <div id="last-updated" class="font-mono text-2xl text-white">——</div>
            </div>
        </div>
    </div>

    <!-- 4个卡片 -->
    <div id="http-cards" class="http-grid">
        <!-- JS 动态生成 -->
    </div>

    <!-- 趋势图 -->
    <div class="bg-slate-900/80 backdrop-blur-xl border border-cyan-900/50 rounded-3xl p-10">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-semibold flex items-center gap-4" style="color: #00f5d4;">
                📈 响应时间趋势（最近 20 次采样）
            </h2>
            <div id="chart-last-updated" class="font-mono text-cyan-300">—</div>
        </div>
        <div style="height: 400px;">
            <canvas id="responseTrendChart"></canvas>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_script %}
<script>
    let responseChart = null;
    const colors = ['#00f5d4', '#a855f7', '#ec4899', '#fb923c'];

    function getStatusStyle(ms) {
        if (!ms) return { color: '#888888', text: 'N/A' };
        if (ms > 800) return { color: '#ff4d4d', text: '较差' };
        if (ms > 400) return { color: '#ffaa00', text: '需关注' };
        return { color: '#00f5d4', text: '优秀' };
    }

    // 创建卡片（优化版：减少 innerHTML 拼接次数）
    function createCards(results) {
        const container = document.getElementById('http-cards');
        container.innerHTML = '';

        results.forEach((item) => {
            const status = getStatusStyle(item.response_time);

            const cardHTML = `
                <div class="http-card">
                    <div class="flex justify-between items-start">
                        <div>
                            <div style="font-size: 1.35rem; font-weight: 600; color: white;">${item.target}</div>
                            <div style="font-size: 0.82rem; color: #88f0e0; margin-top: 4px; word-break: break-all;">${item.url}</div>
                        </div>
                        <div class="status-badge" style="background: rgba(0,245,212,0.1); color: ${status.color}; border: 1px solid ${status.color}20;">
                            ${status.text}
                        </div>
                    </div>

                    <div class="text-center mt-8 mb-6">
                        <div class="response-time" style="color: ${status.color};">
                            ${item.response_time ? item.response_time.toFixed(1) : '—'}
                            <span style="font-size: 1.5rem; font-weight: 400;">ms</span>
                        </div>
                    </div>

                    <div style="text-align: center; padding-top: 16px; border-top: 1px solid rgba(0,245,212,0.15);">
                        <div style="font-size: 0.78rem; color: #88f0e0;">采样时间</div>
                        <div style="font-family: monospace; color: #00f5d4;">${item.timestamp}</div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    async function fetchData() {
        const btn = document.getElementById('refresh-btn');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = `<span class="text-2xl animate-spin inline-block">⟳</span> 加载中...`;
        btn.disabled = true;

        try {
            const res = await fetch('/monitor/api/multi-http/');
            const json = await res.json();

            if (json.code === 0 && json.data) {
                createCards(json.data.results);

                if (json.data.history) {
                    updateChart(json.data.history);
                }

                const now = new Date().toLocaleTimeString('zh-CN', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
                document.getElementById('last-updated').textContent = now;
                document.getElementById('chart-last-updated').textContent = `更新于 ${now}`;
            }
        } catch (err) {
            console.error('获取HTTP数据失败:', err);
        } finally {
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    }

    function updateChart(historyData) {
        const ctx = document.getElementById('responseTrendChart');
        if (responseChart) responseChart.destroy();

        responseChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: historyData.labels,
                datasets: historyData.datasets.map((ds, i) => ({
                    ...ds,
                    borderColor: colors[i % colors.length],
                    backgroundColor: 'transparent',
                    borderWidth: 3,
                    tension: 0.4,
                    pointRadius: 1.5,
                    pointHoverRadius: 6
                }))
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 0          // 关键：关闭动画，显著减少卡顿
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#a0f0e8',
                            font: { size: 13 },
                            padding: 20
                        }
                    }
                },
                scales: {
                    y: {
                        grid: { color: 'rgba(0, 245, 212, 0.08)' },
                        ticks: { color: '#88f0e0' }
                    },
                    x: {
                        grid: { color: 'rgba(0, 245, 212, 0.08)' },
                        ticks: { color: '#88f0e0' }
                    }
                }
            }
        });
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        fetchData();
        // 改为每60秒刷新一次，减少请求压力
        setInterval(fetchData, 60000);
    });
</script>
{% endblock %}
