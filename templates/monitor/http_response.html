{% extends "base.html" %}

{% block title %}HTTP 响应时间监控 - NEON MONITOR{% endblock %}

{% block extra_style %}
<style>
    .http-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);   /* 强制一行四个，横向排列 */
        gap: 16px;
    }
    .http-card {
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(103, 232, 249, 0.3);
        border-radius: 20px;
        padding: 20px 18px;
        transition: all 0.3s ease;
        min-height: 195px;           /* 调矮一点，更合适比例 */
        display: flex;
        flex-direction: column;
    }
    .http-card:hover {
        border-color: #67e8f9;
        transform: translateY(-5px);
        box-shadow: 0 0 30px -8px #67e8f9;
    }
    .response-time {
        font-size: 2.55rem;          /* 大数字比例更协调 */
        font-weight: 700;
        line-height: 1;
        margin-top: auto;
    }
    .chart-container {
        height: 390px;
    }
</style>
{% endblock %}

{% block content %}
<div class="p-6 max-w-screen-2xl mx-auto">

    <!-- 标题栏 -->
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <span class="text-5xl">🌐</span>
            <h1 class="text-4xl font-bold text-cyan-300" style="text-shadow: 0 0 20px #67e8f9;">
                HTTP 响应时间监控
            </h1>
        </div>
        <div>
            <button onclick="refreshData()"
                    class="bg-cyan-500 hover:bg-cyan-400 text-black px-7 py-3.5 rounded-3xl text-sm font-medium flex items-center gap-2">
                🔄 立即刷新
            </button>
            <div id="last-update" class="text-cyan-400 font-mono text-sm mt-3 text-right">
                最后更新: —
            </div>
        </div>
    </div>

    <!-- 四个指标横向一排（比例优化后） -->
    <div class="http-grid" id="http-cards">
        <!-- JS 动态生成 -->
    </div>

    <!-- 趋势图 -->
    <div class="mt-12 bg-zinc-950 border border-cyan-400/30 rounded-3xl p-6">
        <div class="flex justify-between mb-4">
            <h2 class="text-2xl font-semibold text-white">📈 响应时间趋势（最近 20 次）</h2>
            <div id="chart-time" class="text-cyan-400 font-mono text-sm"></div>
        </div>
        <div class="chart-container">
            <canvas id="httpTrendChart"></canvas>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_script %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
let httpChart = null;

function getStatusColor(ms) {
    if (ms > 800) return '#f87171';
    if (ms > 400) return '#fbbf24';
    return '#34d399';
}

function renderCards(results) {
    const container = document.getElementById('http-cards');
    container.innerHTML = '';

    const icons = ['🇺🇸', '🇨🇳', '☁️', '🐙'];
    const names = ['Google', 'Baidu', 'Cloudflare', 'GitHub'];

    results.forEach((item, i) => {
        const ms = item.response_time || 0;
        const color = getStatusColor(ms);

        const cardHTML = `
        <div class="http-card">
            <div class="flex justify-between items-start">
                <div class="text-4xl">${icons[i]}</div>
                <div style="color:${color}" class="text-xs font-bold px-4 py-1 border border-current rounded-2xl">
                    ${ms > 500 ? '较差' : ms > 200 ? '需关注' : '优秀'}
                </div>
            </div>

            <div class="mt-6 text-white font-semibold text-lg">${names[i]}</div>

            <div style="color:${color}" class="response-time">
                ${ms.toFixed(1)} <span class="text-2xl ml-1">ms</span>
            </div>

            <div class="text-xs text-cyan-400 font-mono mt-3">${item.timestamp || '—'}</div>
        </div>`;

        container.innerHTML += cardHTML;
    });
}

function renderChart(history) {
    const ctx = document.getElementById('httpTrendChart');
    if (httpChart) httpChart.destroy();

    const datasets = history.datasets.map(ds => ({
        ...ds,
        data: ds.data.map(v => v === 0 ? null : v),
        borderWidth: 3.5,
        tension: 0.4,
        pointRadius: 2,
        fill: true,
        backgroundColor: ds.borderColor + '20'
    }));

    httpChart = new Chart(ctx, {
        type: 'line',
        data: { labels: history.labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'top', labels: { color: '#67e8f9' } } },
            scales: {
                y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
            }
        }
    });
}

async function refreshData() {
    try {
        const res = await fetch('/monitor/api/multi-http/');
        const json = await res.json();
        if (json.code !== 0) return;

        renderCards(json.data.results);
        renderChart(json.data.history);

        const now = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        document.getElementById('last-update').innerHTML = `最后更新: <span class="text-emerald-400">${now}</span>`;
        document.getElementById('chart-time').textContent = `更新于 ${now}`;
    } catch(e) {}
}

window.onload = () => {
    refreshData();
    setInterval(refreshData, 25000);
};
</script>
{% endblock %}
