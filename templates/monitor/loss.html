{% extends "base.html" %}

{% block title %}丢包率测试 - NEON MONITOR{% endblock %}

{% block extra_style %}
<style>
    .loss-page {
        max-width: 1480px;
        margin: 0 auto;
        padding: 20px 30px;
    }

    .page-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 2.8rem;
        letter-spacing: 2px;
        color: #00f5d4;
        margin-bottom: 6px;
    }

    .subtitle {
        color: #88f0e0;
        font-size: 1.15rem;
    }

    .refresh-btn {
        background: transparent;
        border: 2px solid #00f5d4;
        color: #00f5d4;
        padding: 12px 32px;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s ease;
    }
    .refresh-btn:hover {
        background: #00f5d4;
        color: #0a0e17;
    }

    .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
        gap: 20px;
        margin: 40px 0 50px;
    }

    .monitor-card {
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(0, 245, 212, 0.3);
        border-radius: 16px;
        padding: 24px;
        transition: transform 0.2s ease;
    }

    .monitor-card:hover {
        transform: translateY(-3px);
    }

    .loss-value {
        font-family: 'Orbitron', sans-serif;
        font-size: 4.2rem;
        font-weight: 700;
        line-height: 1;
        margin: 12px 0 8px;
    }

    .bar-container {
        margin-top: 18px;
    }

    .bar {
        height: 14px;
        background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
        border-radius: 9999px;
        transition: width 0.6s ease;
    }

    .status {
        margin-top: 10px;
        padding: 6px 16px;
        border-radius: 30px;
        font-size: 0.95rem;
        font-weight: 600;
        display: inline-block;
    }

    .comparison-section {
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(0, 245, 212, 0.25);
        border-radius: 16px;
        padding: 28px;
        margin-top: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="loss-page">
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
        <div>
            <h1 class="page-title">📉 丢包率监控</h1>
            <p class="subtitle">实时对比四条骨干线路 • 每分钟自动更新</p>
        </div>
        <button onclick="refreshLossData()" class="refresh-btn">🔄 刷新数据</button>
    </div>

    <!-- 4个监控卡片（现在会根据配置动态生成） -->
    <div class="cards-grid" id="cards-grid"></div>

    <!-- 横向对比条形图 -->
    <div class="comparison-section">
        <h2 style="font-family: 'Orbitron', sans-serif; color: #00f5d4; margin-bottom: 20px; font-size: 1.65rem;">
            📊 当前丢包率横向对比
        </h2>
        <div id="bar-charts"></div>
    </div>

    <div style="margin-top: 30px; padding: 16px 20px; background: rgba(249, 115, 22, 0.08); border-left: 5px solid #f59e0b; color: #fcd34d; border-radius: 8px;">
        <strong>参考阈值：</strong>
        ≤ 1%（优秀） • 1%~5%（需关注） • 5%~10%（较差） • >10%（严重）
    </div>
</div>
{% endblock %}

{% block extra_script %}
<script>
// ====================== 核心修改点 ======================
let cardsCreated = false;
let lossChartData = [];

// 动态创建卡片（根据配置页修改的目标自动生成）
function createCardsFromData(results) {
    const container = document.getElementById('cards-grid');
    container.innerHTML = '';

    results.forEach(item => {
        const targetName = item.target;                    // API 返回的名称
        const safeId = targetName.replace(/\./g, '-');     // 防止 id 带点号问题

        const cardHTML = `
            <div class="monitor-card" id="card-${safeId}">
                <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px;">
                    <div style="font-size:2.6rem;">🌐</div>
                    <div>
                        <h3 style="margin:0; color:#fff; font-size:1.45rem;">${targetName}</h3>
                        <p style="margin:4px 0 0; color:#88f0e0; font-size:0.95rem;">${targetName}</p>
                    </div>
                </div>

                <div id="loss-value-${safeId}" class="loss-value" style="color:#22c55e;">0.0</div>
                <div style="color:#88f0e0; font-size:1.05rem;">丢包率 %</div>

                <div id="status-${safeId}" class="status" style="background:rgba(34,197,94,0.2); color:#22c55e;">
                    优秀
                </div>
            </div>
        `;
        container.innerHTML += cardHTML;
    });
}

// 更新卡片数据（保持你原来的逻辑）
function updateCards(results) {
    results.forEach(item => {
        const loss = parseFloat(item.packet_loss) || 0;
        const targetName = item.target;
        const safeId = targetName.replace(/\./g, '-');

        const valueEl = document.getElementById(`loss-value-${safeId}`);
        const statusEl = document.getElementById(`status-${safeId}`);

        if (valueEl) {
            valueEl.textContent = loss.toFixed(1);
            let color = '#22c55e';
            if (loss > 10) color = '#ef4444';
            else if (loss > 5) color = '#f97316';
            else if (loss > 1) color = '#eab308';
            valueEl.style.color = color;
        }

        if (statusEl) {
            let text = '优秀';
            let bg = 'rgba(34,197,94,0.2)';
            let textColor = '#22c55e';

            if (loss > 10) {
                text = '严重'; bg = 'rgba(239,68,68,0.2)'; textColor = '#ef4444';
            } else if (loss > 5) {
                text = '较差'; bg = 'rgba(249,115,22,0.2)'; textColor = '#f97316';
            } else if (loss > 1) {
                text = '需关注'; bg = 'rgba(234,179,8,0.2)'; textColor = '#eab308';
            }

            statusEl.textContent = text;
            statusEl.style.background = bg;
            statusEl.style.color = textColor;
        }
    });
}

// 渲染横向对比条形图（保持你原来的逻辑）
function renderBarCharts(results) {
    const container = document.getElementById('bar-charts');
    container.innerHTML = '';

    results.forEach(item => {
        const loss = parseFloat(item.packet_loss) || 0;
        let color = '#22c55e';
        if (loss > 10) color = '#ef4444';
        else if (loss > 5) color = '#f97316';
        else if (loss > 1) color = '#eab308';

        const widthPercent = Math.min(loss * 8, 100);

        const barHTML = `
            <div style="margin-bottom: 20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-size:0.95rem;">
                    <span>${item.target}</span>
                    <span style="color:${color}; font-weight:600;">${loss.toFixed(1)}%</span>
                </div>
                <div style="background:rgba(255,255,255,0.08); height:14px; border-radius:9999px; overflow:hidden;">
                    <div class="bar" style="width:${widthPercent}%; background:${color};"></div>
                </div>
            </div>
        `;
        container.innerHTML += barHTML;
    });
}

// ====================== 刷新函数（关键修改） ======================
async function refreshLossData() {
    const btn = document.querySelector('.refresh-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '🔄 加载中...';
    btn.disabled = true;

    try {
        // 【重点】改成调用新的 multi-loss API
        const res = await fetch('/monitor/api/multi-loss/');
        const json = await res.json();

        if (json.code === 0) {
            const results = json.data?.results || [];
            lossChartData = results;

            // 第一次加载时动态创建卡片
            if (!cardsCreated) {
                createCardsFromData(results);
                cardsCreated = true;
            }

            updateCards(results);
            renderBarCharts(results);
        }
    } catch (err) {
        console.error('获取丢包率数据失败:', err);
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    refreshLossData();           // 第一次加载就会创建卡片
    setInterval(refreshLossData, 60000);   // 每分钟自动刷新
});
</script>
{% endblock %}
