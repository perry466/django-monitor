{% extends "base.html" %}

{% block title %}多目标 Ping 延迟监控 - NEON MONITOR{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-6 py-6">
    <!-- 标题栏 -->
    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="text-3xl font-bold neon-text">多目标 Ping 延迟监控</h1>
            <p class="text-gray-400 text-sm mt-1">最近 20 次采样趋势对比</p>
        </div>

        <button id="refresh-btn"
                class="neon-button flex items-center gap-2 px-6 py-3 rounded-2xl text-sm font-medium">
            <span id="refresh-text">🔄 刷新</span>
            <span id="refresh-spinner" class="hidden animate-spin">⟳</span>
        </button>
    </div>

    <!-- 紧凑四卡片 - 强制一行4个 -->
    <div id="target-cards" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
        <!-- 动态生成 -->
    </div>

    <!-- 图表区域 -->
    <div class="bg-zinc-900/70 backdrop-blur-xl border border-white/10 rounded-3xl p-6">
        <h2 class="text-xl font-semibold mb-5 text-white flex items-center gap-2">
            📈 延迟趋势（最近20次）
        </h2>
        <div class="h-[460px]">
            <canvas id="pingTrendChart"></canvas>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_script %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
// ==================== 变量 ====================
let pingChart = null;
let currentType = 'line';

// ==================== 渲染更小卡片 ====================
function renderCards(results) {
    const container = document.getElementById('target-cards');
    container.innerHTML = '';

    results.forEach(item => {
        const isUp = item.ping_time > 0 && item.packet_loss < 10;
        const html = `
            <div class="neon-card">
                <div class="text-sm font-medium text-white mb-1 truncate">${item.target}</div>
                <div class="text-3xl font-bold text-white">${item.ping_time}<span class="text-cyan-400 text-lg ml-1">ms</span></div>
                <div class="text-xs text-gray-400 mt-1">丢包 ${item.packet_loss}%</div>
                <div class="flex justify-between items-center mt-3 text-xs">
                    <span class="${isUp ? 'text-emerald-400' : 'text-red-400'}">
                        ${isUp ? '● 在线' : '● 异常'}
                    </span>
                    <span class="text-gray-500">${item.timestamp}</span>
                </div>
            </div>`;
        container.innerHTML += html;
    });
}

// ==================== 图表 ====================
function initTrendChart(history) {
    const ctx = document.getElementById('pingTrendChart');
    if (pingChart) pingChart.destroy();

    pingChart = new Chart(ctx, {
        type: currentType,
        data: { labels: history.labels, datasets: history.datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'top', labels: { color: '#ddd', font: {size: 12} }}
            },
            scales: {
                x: { grid: {color: '#ffffff08'}, ticks: {color: '#aaa'} },
                y: { grid: {color: '#ffffff08'}, ticks: {color: '#aaa'} }
            }
        }
    });
}

async function fetchData() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    document.getElementById('refresh-text').classList.add('hidden');
    document.getElementById('refresh-spinner').classList.remove('hidden');

    try {
        const res = await fetch('/monitor/api/multi-ping/');
        const json = await res.json();
        if (json.code === 0) {
            renderCards(json.data.results);
            initTrendChart(json.data.history);
        }
    } catch(e) {
        console.error(e);
    } finally {
        btn.disabled = false;
        document.getElementById('refresh-text').classList.remove('hidden');
        document.getElementById('refresh-spinner').classList.add('hidden');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    fetchData();
    setInterval(fetchData, 25000);
});
</script>

<style>
.neon-text {
    text-shadow: 0 0 15px #67e8f9, 0 0 30px #22d3ee;
}

.neon-button {
    background: linear-gradient(90deg, #22d3ee, #a855f7);
    box-shadow: 0 0 20px rgba(103,232,249,0.5);
}

.neon-card {
    background: rgba(15,23,42,0.95);
    border: 1px solid rgba(103,232,249,0.25);
    border-radius: 16px;
    padding: 14px 16px;
    height: 138px;
    transition: all 0.3s;
}

.neon-card:hover {
    border-color: #67e8f9;
    transform: translateY(-3px);
}
</style>
{% endblock %}
