<!-- templates/targets/config.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多目标监控配置 - 网络性能监控系统</title>
    <style>
        :root {
            --primary-color: #0ea5e9;
            --secondary-color: #0284c7;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-color: #e2e8f0;
            --border-color: #334155;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg), #1e3a8a);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部导航 */
        .header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .nav-menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(14, 165, 233, 0.2), transparent);
            transition: left 0.5s;
        }

        .nav-item:hover::before {
            left: 100%;
        }

        .nav-item:hover {
            background: rgba(14, 165, 233, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.3);
        }

        /* 主标题 */
        .page-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(14, 165, 233, 0.3);
        }

        /* 配置卡片网格 */
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .target-card {
            background: linear-gradient(145deg, var(--card-bg), #2d3748);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .target-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color), var(--primary-color));
            z-index: -1;
            border-radius: 18px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .target-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(14, 165, 233, 0.4);
        }

        .target-card:hover::before {
            opacity: 1;
        }

        .target-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .target-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .target-number {
            background: rgba(14, 165, 233, 0.2);
            color: var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 500;
        }

        .target-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: rgba(30, 41, 59, 0.5);
            color: var(--text-color);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .target-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }

        .target-input.error {
            border-color: var(--danger-color);
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4);
        }

        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .target-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
        }

        .status-dot.inactive {
            background: var(--warning-color);
        }

        /* 控制面板 */
        .control-panel {
            background: linear-gradient(145deg, var(--card-bg), #2d3748);
            border-radius: 16px;
            padding: 25px;
            margin-top: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .panel-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-reset {
            padding: 12px 24px;
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
            border: 2px solid var(--danger-color);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        .btn-sync {
            padding: 12px 24px;
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
            border: 2px solid var(--success-color);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-sync:hover {
            background: rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-menu {
                flex-direction: column;
                align-items: stretch;
            }

            .nav-links {
                justify-content: center;
            }

            .page-title {
                font-size: 2rem;
            }

            .config-grid {
                grid-template-columns: 1fr;
            }

            .panel-buttons {
                flex-direction: column;
            }

            .btn-save {
                margin-bottom: 10px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 10px 15px;
            }

            .nav-item {
                padding: 8px 15px;
                font-size: 0.9rem;
            }

            .target-card {
                padding: 20px;
            }

            .target-title {
                font-size: 1.1rem;
            }
        }

        /* 加载动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .target-card, .control-panel {
            animation: fadeInUp 0.6s ease forwards;
        }

        .target-card:nth-child(2) { animation-delay: 0.1s; }
        .target-card:nth-child(3) { animation-delay: 0.2s; }
        .target-card:nth-child(4) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <nav class="nav-menu">
                <div class="logo">网络监控系统</div>
                <div class="nav-links">
                    <a href="monitor/latency/" class="nav-item">延迟测试</a>
                    <a href="/monitor/ping/" class="nav-item">丢包率测试</a>
                    <a href="/monitor/http/" class="nav-item">HTTP响应时间</a>
                    <a href="/monitor/jitter/" class="nav-item">网络抖动</a>
                    <a href="/monitor/dns/" class="nav-item">DNS解析时间</a>
                    <a href="/monitor/tcp/" class="nav-item">TCP重传率</a>
                    <a href="/targets/config/" class="nav-item active">多目标监控配置</a>div>

            </nav>
        </header>

        <!-- 主标题 -->
        <h1 class="page-title">多目标监控配置</h1>

        <!-- 配置卡片 -->
        <div class="config-grid">
            <!-- 目标1 -->
            <div class="target-card">
                <div class="target-header">
                    <h3 class="target-title">监控目标 1</h3>
                    <div class="target-number">Target 1</div>
                </div>

                <div class="input-group">
                    <label class="input-label">IP地址或域名</label>
                    <input type="text" id="target1" class="target-input" placeholder="例如: 8.8.8.8 或 www.google.com">
                </div>

                <button onclick="saveTarget(1)" class="btn-save">保存修改</button>

                <div id="message1" class="status-message" style="display: none;"></div>

                <div class="target-status">
                    <div class="status-dot" id="status1"></div>
                    <span id="status-text1">未配置</span>
                </div>
            </div>

            <!-- 目标2 -->
            <div class="target-card">
                <div class="target-header">
                    <h3 class="target-title">监控目标 2</h3>
                    <div class="target-number">Target 2</div>
                </div>

                <div class="input-group">
                    <label class="input-label">IP地址或域名</label>
                    <input type="text" id="target2" class="target-input" placeholder="例如: 114.114.114.114 或 www.baidu.com">
                </div>

                <button onclick="saveTarget(2)" class="btn-save">保存修改</button>

                <div id="message2" class="status-message" style="display: none;"></div>

                <div class="target-status">
                    <div class="status-dot" id="status2"></div>
                    <span id="status-text2">未配置</span>
                </div>
            </div>

            <!-- 目标3 -->
            <div class="target-card">
                <div class="target-header">
                    <h3 class="target-title">监控目标 3</h3>
                    <div class="target-number">Target 3</div>
                </div>

                <div class="input-group">
                    <label class="input-label">IP地址或域名</label>
                    <input type="text" id="target3" class="target-input" placeholder="例如: 223.5.5.5 或 www.aliyun.com">
                </div>

                <button onclick="saveTarget(3)" class="btn-save">保存修改</button>

                <div id="message3" class="status-message" style="display: none;"></div>

                <div class="target-status">
                    <div class="status-dot" id="status3"></div>
                    <span id="status-text3">未配置</span>
                </div>
            </div>

            <!-- 目标4 -->
            <div class="target-card">
                <div class="target-header">
                    <h3 class="target-title">监控目标 4</h3>
                    <div class="target-number">Target 4</div>
                </div>

                <div class="input-group">
                    <label class="input-label">IP地址或域名</label>
                    <input type="text" id="target4" class="target-input" placeholder="例如: 119.29.29.29 或 www.tencent.com">
                </div>

                <button onclick="saveTarget(4)" class="btn-save">保存修改</button>

                <div id="message4" class="status-message" style="display: none;"></div>

                <div class="target-status">
                    <div class="status-dot" id="status4"></div>
                    <span id="status-text4">未配置</span>
                </div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="panel-buttons">
                <button onclick="resetAllTargets()" class="btn-reset">重置所有目标</button>
                <button onclick="syncToBackend()" class="btn-sync">同步到服务器</button>
                <a href="/targets/dashboard" class="btn-sync" style="display: inline-block; text-decoration: none;">查看监控仪表盘</a>
            </div>
        </div>
    </div>

    <script>
        // IP和域名验证正则表达式
        const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
        const domainRegex = /^[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}$/;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadTargetsFromStorage();
        });

        // 从localStorage加载目标配置
        function loadTargetsFromStorage() {
            for (let i = 1; i <= 4; i++) {
                const target = localStorage.getItem(`monitor_target_${i}`);
                if (target) {
                    document.getElementById(`target${i}`).value = target;
                    updateTargetStatus(i, true);
                } else {
                    updateTargetStatus(i, false);
                }
            }
        }

        // 保存目标配置
        function saveTarget(targetNum) {
            const inputElement = document.getElementById(`target${targetNum}`);
            const messageElement = document.getElementById(`message${targetNum}`);
            const inputValue = inputElement.value.trim();

            // 验证输入
            if (!inputValue) {
                showErrorMessage(messageElement, '请输入IP地址或域名');
                return;
            }

            if (!ipRegex.test(inputValue) && !domainRegex.test(inputValue)) {
                showErrorMessage(messageElement, '请输入有效的IP地址或域名');
                return;
            }

            // 保存到localStorage
            localStorage.setItem(`monitor_target_${targetNum}`, inputValue);

            // 更新状态
            updateTargetStatus(targetNum, true);

            // 显示成功消息
            showSuccessMessage(messageElement, '目标保存成功');

            // 清除错误样式
            inputElement.classList.remove('error');
        }

        // 更新目标状态
        function updateTargetStatus(targetNum, isActive) {
            const statusDot = document.getElementById(`status${targetNum}`);
            const statusText = document.getElementById(`status-text${targetNum}`);

            if (isActive) {
                statusDot.className = 'status-dot';
                statusText.textContent = '已激活';
            } else {
                statusDot.className = 'status-dot inactive';
                statusText.textContent = '未配置';
            }
        }

        // 显示成功消息
        function showSuccessMessage(element, message) {
            element.textContent = message;
            element.className = 'status-message status-success';
            element.style.display = 'block';

            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }

        // 显示错误消息
        function showErrorMessage(element, message) {
            element.textContent = message;
            element.className = 'status-message status-error';
            element.style.display = 'block';

            // 添加错误样式到输入框
            const targetInput = element.previousElementSibling.previousElementSibling;
            if (targetInput && targetInput.classList.contains('target-input')) {
                targetInput.classList.add('error');
            }

            setTimeout(() => {
                element.style.display = 'none';
                if (targetInput) {
                    targetInput.classList.remove('error');
                }
            }, 3000);
        }

        // 重置所有目标
        function resetAllTargets() {
            if (confirm('确定要重置所有监控目标吗？此操作不可撤销。')) {
                for (let i = 1; i <= 4; i++) {
                    localStorage.removeItem(`monitor_target_${i}`);
                    document.getElementById(`target${i}`).value = '';
                    updateTargetStatus(i, false);

                    // 清除消息
                    const messageElement = document.getElementById(`message${i}`);
                    messageElement.style.display = 'none';
                }
            }
        }

        // 同步到后端（预留接口）
        function syncToBackend() {
            // 获取所有目标配置
            const targets = {};
            for (let i = 1; i <= 4; i++) {
                const target = localStorage.getItem(`monitor_target_${i}`);
                if (target) {
                    targets[`target${i}`] = target;
                }
            }

            // 预留后端API调用
            fetch('/api/sync-targets/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(targets)
            })
            .then(response => response.json())
            .then(data => {
                alert('配置已同步到服务器');
            })
            .catch(error => {
                console.error('同步失败:', error);
                alert('同步失败，请检查网络连接');
            });
        }

        // 实时验证输入
        for (let i = 1; i <= 4; i++) {
            const inputElement = document.getElementById(`target${i}`);
            inputElement.addEventListener('input', function() {
                const value = this.value.trim();
                if (value && !ipRegex.test(value) && !domainRegex.test(value)) {
                    this.classList.add('error');
                } else {
                    this.classList.remove('error');
                }
            });
        }

        // 按Enter键保存
        for (let i = 1; i <= 4; i++) {
            const inputElement = document.getElementById(`target${i}`);
            inputElement.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    saveTarget(i);
                }
            });
        }
    </script>
</body>
</html>
