{% extends "base.html" %}

{% block title %}多目标监控配置 - NEON MONITOR{% endblock %}

{% block content %}
<div class="config-page">
    <h1>🌐 多目标监控配置</h1>
    <p>为不同监控类型分别设置监测对象。页面加载时已显示当前正在监测的目标。</p>

    <!-- Tab 导航 -->
    <div class="tabs">
        <button class="tab-button active" data-tab="ping">Ping & 丢包率</button>
        <button class="tab-button" data-tab="http">HTTP响应时间</button>
        <button class="tab-button" data-tab="jitter">网络抖动</button>
        <button class="tab-button" data-tab="dns">DNS解析时间</button>
    </div>

    <!-- Tab 内容 -->
    <div id="tab-ping" class="tab-content active">
        <h2>Ping & 丢包率 - 当前监测对象</h2>
        <div class="targets-grid" id="grid-ping"></div>
    </div>

    <div id="tab-http" class="tab-content">
        <h2>HTTP响应时间 - 当前监测对象</h2>
        <div class="targets-grid" id="grid-http"></div>
    </div>

    <div id="tab-jitter" class="tab-content">
        <h2>网络抖动 - 当前监测对象</h2>
        <div class="targets-grid" id="grid-jitter"></div>
    </div>

    <div id="tab-dns" class="tab-content">
        <h2>DNS解析时间 - 当前监测对象</h2>
        <div class="targets-grid" id="grid-dns"></div>
    </div>

    <div class="action-bar">
        <button onclick="saveCurrentTab()" class="btn-save">💾 保存当前分类配置</button>
        <button onclick="loadCurrentTab()" class="btn-refresh">🔄 刷新当前分类</button>
    </div>

    <div id="statusMessage" class="status"></div>
</div>
{% endblock %}

{% block extra_script %}
<script>
// 当前激活的Tab
let currentTab = 'ping';

// 创建卡片
function createTargetCard(index) {
    const card = document.createElement('div');
    card.className = 'target-card';
    card.innerHTML = `
        <h3>监测目标 ${index + 1}</h3>
        <div class="form-group">
            <label>目标名称</label>
            <input type="text" class="name-input" placeholder="例如: Google DNS" value="">
        </div>
        <div class="form-group">
            <label>监测地址</label>
            <input type="text" class="address-input" placeholder="8.8.8.8 或 www.baidu.com" value="">
        </div>
        <div class="form-group">
            <label>描述（可选）</label>
            <input type="text" class="desc-input" value="">
        </div>
        <label class="switch">
            <input type="checkbox" class="active-check" checked>
            <span class="slider"></span>
        </label>
        <span class="switch-label">启用监测</span>
    `;
    return card;
}

// 渲染4个卡片
function renderEmptyCards(category) {
    const grid = document.getElementById(`grid-${category}`);
    grid.innerHTML = '';
    for (let i = 0; i < 4; i++) {
        grid.appendChild(createTargetCard(i));
    }
}

// 填充已保存的数据
function fillTargets(category, savedTargets) {
    const grid = document.getElementById(`grid-${category}`);
    const cards = grid.querySelectorAll('.target-card');

    savedTargets.forEach((target, i) => {
        if (cards[i]) {
            cards[i].querySelector('.name-input').value = target.name || '';
            cards[i].querySelector('.address-input').value = target.address || '';
            cards[i].querySelector('.desc-input').value = target.description ? target.description.replace('category:' + category, '') : '';
            cards[i].querySelector('.active-check').checked = target.is_active !== false;
        }
    });
}

// 加载某个分类的当前监测对象
async function loadCategory(category) {
    try {
        const res = await fetch(`/targets/api/get-targets-by-category/?category=${category}`);
        const data = await res.json();

        renderEmptyCards(category);

        if (data.status === 'success' && data.targets.length > 0) {
            fillTargets(category, data.targets);
            console.log(`已加载 ${category} 当前监测目标`);
        } else {
            // 如果没有数据，显示默认示例
            const defaultExamples = {
                ping: [
                    {name: "Google DNS", address: "8.8.8.8"},
                    {name: "Cloudflare", address: "1.1.1.1"},
                    {name: "百度", address: "baidu.com"},
                    {name: "阿里DNS", address: "223.5.5.5"}
                ],
                http: [
                    {name: "Google", address: "https://www.google.com"},
                    {name: "Baidu", address: "https://www.baidu.com"},
                    {name: "GitHub", address: "https://github.com"},
                    {name: "Cloudflare", address: "https://www.cloudflare.com"}
                ],
                jitter: [
                    {name: "Google DNS", address: "8.8.8.8"},
                    {name: "Cloudflare DNS", address: "1.1.1.1"},
                    {name: "百度", address: "baidu.com"},
                    {name: "114DNS", address: "114.114.114.114"}
                ],
                dns: [
                    {name: "Google", address: "google.com"},
                    {name: "Cloudflare", address: "cloudflare.com"},
                    {name: "Baidu", address: "baidu.com"},
                    {name: "阿里DNS", address: "dns.aliyun.com"}
                ]
            };

            if (defaultExamples[category]) {
                fillTargets(category, defaultExamples[category]);
            }
        }
    } catch (e) {
        console.error("加载失败", e);
        renderEmptyCards(category);
    }
}

// 保存当前Tab
async function saveCurrentTab() {
    const grid = document.getElementById(`grid-${currentTab}`);
    const cards = grid.querySelectorAll('.target-card');
    const targets = [];

    cards.forEach(card => {
        const name = card.querySelector('.name-input').value.trim();
        const address = card.querySelector('.address-input').value.trim();
        const desc = card.querySelector('.desc-input').value.trim();
        const active = card.querySelector('.active-check').checked;

        if (address) {
            targets.push({
                name: name || `${currentTab} 目标`,
                address: address,
                type: 'domain',
                description: desc,
                is_active: active
            });
        }
    });

    if (targets.length === 0) {
        showMessage('至少填写一个监测地址', 'error');
        return;
    }

    try {
        const res = await fetch('/targets/api/sync-targets/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ category: currentTab, targets: targets })
        });
        const data = await res.json();
        showMessage(data.message, data.status === 'success' ? 'success' : 'error');

        // 保存成功后重新加载当前Tab
        if (data.status === 'success') {
            setTimeout(() => loadCategory(currentTab), 600);
        }
    } catch (e) {
        showMessage('保存失败，请检查网络', 'error');
    }
}

function showMessage(msg, type = 'info') {
    const el = document.getElementById('statusMessage');
    el.textContent = msg;
    el.className = `status ${type}`;
    setTimeout(() => el.textContent = '', 5000);
}

// Tab 切换
document.querySelectorAll('.tab-button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        currentTab = btn.dataset.tab;
    });
});

// 页面加载时自动加载所有分类的当前监测对象
document.addEventListener('DOMContentLoaded', () => {
    const categories = ['ping', 'http', 'jitter', 'dns'];
    categories.forEach(cat => {
        loadCategory(cat);
    });
});
</script>

<style>
.config-page { max-width: 1200px; margin: 30px auto; padding: 20px; }
.tabs { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
.tab-button {
    padding: 12px 26px;
    background: #374151;
    color: #e2e8f0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
}
.tab-button.active {
    background: #22d3ee;
    color: #0f172a;
    font-weight: bold;
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.targets-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    gap: 20px;
}
.target-card {
    background: #1f2937;
    padding: 22px;
    border-radius: 12px;
    border: 1px solid #475569;
}
.target-card h3 { margin: 0 0 18px 0; color: #60a5fa; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.95rem; }
.form-group input {
    width: 100%;
    padding: 10px 12px;
    background: #0f172a;
    border: 1px solid #475569;
    border-radius: 6px;
    color: white;
}

.action-bar { text-align: center; margin: 40px 0 20px; }
.btn-save, .btn-refresh {
    padding: 13px 32px;
    margin: 0 10px;
    border: none;
    border-radius: 8px;
    font-size: 1.05rem;
    cursor: pointer;
}
.btn-save { background: #22c55e; color: white; }
.btn-refresh { background: #64748b; color: white; }

.switch { position: relative; display: inline-block; width: 52px; height: 28px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background-color: #334155; transition: .4s; border-radius: 50px;
}
.slider:before {
    position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px;
    background-color: white; transition: .4s; border-radius: 50%;
}
input:checked + .slider { background-color: #22c55e; }
input:checked + .slider:before { transform: translateX(24px); }

.status {
    padding: 15px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
    margin: 15px 0;
}
.status.success { background: #14532d; color: #86efac; }
.status.error { background: #7f1d1d; color: #fda4af; }
</style>
{% endblock %}
