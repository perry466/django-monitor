{% extends "base.html" %}

{% block title %}多目标监控仪表盘 - NEON MONITOR{% endblock %}

{% block extra_style %}
<style>
    .neon-card {
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(0, 245, 212, 0.4);
        box-shadow: 0 0 25px rgba(0, 245, 212, 0.3);
        transition: all 0.4s ease;
    }
    .neon-card:hover {
        box-shadow: 0 0 40px rgba(0, 245, 212, 0.45);
        transform: translateY(-6px);
    }

    .targets-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 24px;
        margin-bottom: 60px;
    }

    .target-card {
        padding: 24px;
        border-radius: 20px;
    }

    .target-name {
        font-size: 1.35rem;
        font-weight: 600;
        color: #fff;
    }

    .target-address {
        font-size: 0.95rem;
        color: #88f0e0;
        word-break: break-all;
        margin-top: 4px;
    }

    .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: 0 0 12px currentColor;
    }

    .chart-container {
        position: relative;
        height: 420px;
    }

    @media (max-width: 640px) {
        .chart-container {
            height: 340px;
        }
    }

    .gradient-text {
        background: linear-gradient(90deg, #00f5d4, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <!-- 页面标题 -->
    <div class="text-center mb-12">
        <h1 class="text-4xl sm:text-5xl font-bold tracking-tighter gradient-text">
            多目标监控仪表盘
        </h1>
        <p class="text-cyan-300 mt-4 text-lg">实时查看所有配置目标的监控状态</p>
    </div>

    <!-- 目标状态卡片 -->
    <div class="targets-grid" id="targets-grid">
        <!-- JavaScript 动态生成 4 个目标卡片 -->
    </div>

    <!-- 图表区域 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

        <!-- 延迟/丢包率/HTTP 对比柱状图 -->
        <div class="neon-card rounded-3xl p-8">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-semibold text-cyan-400 flex items-center gap-3">
                    📊 延迟 / 丢包率 / HTTP 响应时间对比
                </h3>
                <button onclick="refreshBarChart()" 
                        class="px-6 py-3 bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-400 text-cyan-400 rounded-2xl text-sm font-medium transition-all">
                    🔄 刷新
                </button>
            </div>
            <div class="chart-container">
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <!-- 抖动 / TCP 重传率趋势 -->
        <div class="neon-card rounded-3xl p-8">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-semibold text-cyan-400 flex items-center gap-3">
                    📈 网络抖动 / TCP 重传率趋势
                </h3>
                <button onclick="refreshLineChart()" 
                        class="px-6 py-3 bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-400 text-cyan-400 rounded-2xl text-sm font-medium transition-all">
                    🔄 刷新
                </button>
            </div>
            <div class="chart-container">
                <canvas id="lineChart"></canvas>
            </div>
        </div>

        <!-- DNS 解析时间热力图（跨列） -->
        <div class="neon-card rounded-3xl p-8 lg:col-span-2">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-semibold text-cyan-400 flex items-center gap-3">
                    🔍 DNS 解析时间分布热力图
                </h3>
                <button onclick="refreshHeatmap()" 
                        class="px-6 py-3 bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-400 text-cyan-400 rounded-2xl text-sm font-medium transition-all">
                    🔄 刷新
                </button>
            </div>
            <div class="chart-container">
                <canvas id="heatmapChart"></canvas>
            </div>
        </div>

    </div>
</div>
{% endblock %}

{% block extra_script %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<script>
let barChart, lineChart, heatmapChart;

// 初始化所有图表
function initCharts() {
    // 1. 柱状图 - 延迟/丢包率/HTTP
    const barCtx = document.getElementById('barChart').getContext('2d');
    barChart = new Chart(barCtx, {
        type: 'bar',
        data: {
            labels: ['目标 1', '目标 2', '目标 3', '目标 4'],
            datasets: [
                {
                    label: '延迟 (ms)',
                    data: [42, 68, 35, 91],
                    backgroundColor: '#22d3ee'
                },
                {
                    label: '丢包率 (%)',
                    data: [0.8, 2.3, 0.4, 5.1],
                    backgroundColor: '#f97316'
                },
                {
                    label: 'HTTP响应 (ms)',
                    data: [124, 289, 87, 456],
                    backgroundColor: '#a855f7'
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#a0f0e8', padding: 20 } }
            },
            scales: {
                x: { grid: { color: 'rgba(0,245,212,0.08)' }, ticks: { color: '#94a3b8' } },
                y: { grid: { color: 'rgba(0,245,212,0.08)' }, ticks: { color: '#94a3b8' } }
            }
        }
    });

    // 2. 折线图 - 抖动 / TCP 重传率
    const lineCtx = document.getElementById('lineChart').getContext('2d');
    lineChart = new Chart(lineCtx, {
        type: 'line',
        data: {
            labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'],
            datasets: [
                {
                    label: '网络抖动 (ms)',
                    data: [4.2, 6.8, 3.1, 12.5, 5.4, 8.9],
                    borderColor: '#22d3ee',
                    backgroundColor: 'rgba(34, 211, 238, 0.15)',
                    tension: 0.4,
                    borderWidth: 3,
                    fill: true
                },
                {
                    label: 'TCP 重传率 (%)',
                    data: [0.12, 0.45, 0.08, 1.23, 0.67, 0.34],
                    borderColor: '#f87171',
                    backgroundColor: 'rgba(248, 113, 113, 0.15)',
                    tension: 0.4,
                    borderWidth: 3,
                    borderDash: [4, 2],
                    fill: true
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#a0f0e8' } }
            },
            scales: {
                x: { grid: { color: 'rgba(0,245,212,0.08)' }, ticks: { color: '#94a3b8' } },
                y: { grid: { color: 'rgba(0,245,212,0.08)' }, ticks: { color: '#94a3b8' } }
            }
        }
    });

    // 3. 热力图（用柱状图模拟）
    const heatCtx = document.getElementById('heatmapChart').getContext('2d');
    heatmapChart = new Chart(heatCtx, {
        type: 'bar',
        data: {
            labels: ['00:00','03:00','06:00','09:00','12:00','15:00','18:00','21:00'],
            datasets: [
                { label: '目标1 DNS', data: [12,18,9,25,14,31,11,17], backgroundColor: '#22d3ee88' },
                { label: '目标2 DNS', data: [28,15,22,19,35,8,24,16], backgroundColor: '#a855f788' },
                { label: '目标3 DNS', data: [9,14,27,11,18,29,13,21], backgroundColor: '#f472b688' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#a0f0e8' } }
            },
            scales: {
                x: { grid: { color: 'rgba(0,245,212,0.08)' }, ticks: { color: '#94a3b8' } },
                y: { grid: { color: 'rgba(0,245,212,0.08)' }, ticks: { color: '#94a3b8' } }
            }
        }
    });
}

// 渲染目标状态卡片
function renderTargetCards() {
    const container = document.getElementById('targets-grid');
    container.innerHTML = '';

    for (let i = 1; i <= 4; i++) {
        const cardHTML = `
            <div class="neon-card target-card p-7">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-cyan-300 text-xs tracking-widest">目标 ${i}</div>
                        <div class="target-name mt-2" id="name-${i}">目标 ${i}</div>
                        <div class="target-address text-sm mt-1" id="addr-${i}">未配置</div>
                    </div>
                    <div class="status-dot bg-emerald-400" id="dot-${i}"></div>
                </div>
                <div class="mt-8 text-xs text-cyan-300">状态</div>
                <div class="text-emerald-400 font-medium text-lg mt-1" id="status-${i}">在线</div>
            </div>
        `;
        container.innerHTML += cardHTML;
    }
}

// 刷新柱状图（示例数据）
function refreshBarChart() {
    if (!barChart) return;
    barChart.data.datasets[0].data = [38, 72, 29, 105];
    barChart.data.datasets[1].data = [0.4, 3.2, 0.8, 6.5];
    barChart.data.datasets[2].data = [89, 245, 67, 412];
    barChart.update();
}

// 刷新折线图
function refreshLineChart() {
    if (!lineChart) return;
    lineChart.data.labels = ['00:00','04:00','08:00','12:00','16:00','20:00'];
    lineChart.data.datasets.forEach(ds => {
        ds.data = Array(6).fill(0).map(() => Math.random() * 15);
    });
    lineChart.update();
}

// 刷新热力图
function refreshHeatmap() {
    if (!heatmapChart) return;
    heatmapChart.data.datasets.forEach(ds => {
        ds.data = Array(8).fill(0).map(() => Math.floor(Math.random() * 40));
    });
    heatmapChart.update();
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    renderTargetCards();
    initCharts();

    // 每45秒自动刷新一次演示数据
    setInterval(() => {
        refreshBarChart();
        refreshLineChart();
        refreshHeatmap();
    }, 45000);
});
</script>
{% endblock %}
